version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bonobos_user
      POSTGRES_PASSWORD: bonobos_pass
      POSTGRES_DB: bonobos_db
    ports:
      - "5439:5432"
    volumes:
      - bonobos_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bonobos_user -d bonobos_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6385:6379"
    volumes:
      - bonobos_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8004:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://bonobos_user:bonobos_pass@postgres:5432/bonobos_db
      - REDIS_URL=redis://redis:6379/0
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - CHROMA_PERSIST_DIR=/app/chroma_store
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - bonobos_chroma_data:/app/chroma_store

volumes:
  bonobos_postgres_data:
  bonobos_redis_data:
  bonobos_chroma_data:
